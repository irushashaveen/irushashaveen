  <!-- Accent architectural lines (blueprint style) -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="199" x2="900" y2="199" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="197" x2="900" y2="197" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
  <!-- Left vertical accent -->
  <line x1="40" y1="0" x2="40" y2="200" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
  <!-- Right vertical accent -->
  <line x1="860" y1="0" x2="860" y2="200" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner bracket marks -->
