  <path d="M 880 20 L 880 8 L 892 8" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 20 180 L 20 192 L 8 192" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 880 180 L 880 192 L 892 192" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- Name text with glow -->
