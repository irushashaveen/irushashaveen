<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark base gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <!-- Blue accent glow -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#0e2a4a;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0" />
    </radialGradient>
    <!-- Center name glow -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#1e4a7a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0" />
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" />
  <rect width="900" height="200" fill="url(#glowLeft)" />
  <rect width="900" height="200" fill="url(#glowRight)" />
  <rect width="900" height="200" fill="url(#glowCenter)" />

